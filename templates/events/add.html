{% extends 'base.html' %}

{% block title %}Add Event - Event Scheduler{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 bg-primary text-white rounded-t-lg">
      <h4 class="mb-0 text-lg font-semibold"><i class="bi bi-plus-circle"></i> Add New Event</h4>
    </div>
    <div class="px-6 py-6">
      <form method="POST" action="{{ url_for('add_event') }}">
        <div class="mb-4">
          <label for="title" class="block text-sm font-medium text-gray-700">Event Title <span class="text-red-600">*</span></label>
          <input type="text" id="title" name="title" required placeholder="Enter event title" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-primary focus:border-primary p-2" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="start_time" class="block text-sm font-medium text-gray-700">Start Time <span class="text-red-600">*</span></label>
            <input type="datetime-local" id="start_time" name="start_time" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-primary focus:border-primary p-2" />
          </div>

          <div>
            <label for="end_time" class="block text-sm font-medium text-gray-700">End Time <span class="text-red-600">*</span></label>
            <input type="datetime-local" id="end_time" name="end_time" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-primary focus:border-primary p-2" />
          </div>
        </div>

        <div class="mt-4">
          <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Enter event description (optional)" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:ring-primary focus:border-primary p-2"></textarea>
        </div>

        <div class="flex items-center justify-between mt-6">
          <a href="{{ url_for('list_events') }}" class="inline-flex items-center px-3 py-2 rounded bg-gray-200 hover:bg-gray-300 text-gray-700">
            <i class="bi bi-arrow-left"></i> Back
          </a>
          <button type="submit" class="inline-flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-md shadow hover:bg-primary/90">
            <i class="bi bi-check-circle"></i> Add Event
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
