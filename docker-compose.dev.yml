version: '3.8'

services:
  # Development setup with hot-reload and SQLite
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: event-scheduler-dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - SECRET_KEY=dev-secret-key
    volumes:
      # Mount source code for hot-reload
      - .:/app
      - /app/__pycache__
      - /app/instance
    networks:
      - event-scheduler-dev-network
    stdin_open: true
    tty: true
    command: python app.py

networks:
  event-scheduler-dev-network:
    driver: bridge
